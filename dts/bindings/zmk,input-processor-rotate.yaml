description: |
  Skew compensation input processor for trackball sensors.
  Corrects Y-to-X axis crosstalk by subtracting a fraction of Y from X.

compatible: "zmk,input-processor-rotate"

include: [base.yaml]

properties:
  "#input-processor-cells":
    type: int
    required: true
    const: 0
  type:
    type: int
    required: true
  x-code:
    type: int
    required: true
  y-code:
    type: int
    required: true
  skew-percent:
    type: int
    required: true
    description: Compensation factor as percentage (e.g. 28 = subtract 28% of Y from X)
  track-remainders:
    type: boolean
